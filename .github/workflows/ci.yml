name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
