name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@896e71e063dc0933bb442a54e949d75291991ecb
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
