name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
