name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ruby/setup-ruby@c984c1a20bb35a1cbda04477c816cea024418be9
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
