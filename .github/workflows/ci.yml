name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@b90be12699fdfcbee4440c2bba85f6f460446bb0
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
