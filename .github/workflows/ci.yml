name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@9f5530874dfbf5a45daf84b813b248ed7ae3fee9
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
