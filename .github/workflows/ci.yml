name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@67178a2693508efe3b990b9b782c5b9edd55d435
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
