name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@757ecf59ea7938b8e5b3e51df38546c014bfef16
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
