name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
