name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@19a9babd0096de1a2aa716cac395f01253934999
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
