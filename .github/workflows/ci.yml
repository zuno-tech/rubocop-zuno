name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
