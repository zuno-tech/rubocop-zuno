name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
