name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@675dd7ba1b06c8786a1480d89c384f5620a42647
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
