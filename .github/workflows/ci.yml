name: CI

on:
  push:
    paths-ignore:
      - "README.md"

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      - run: bundle exec rake test
